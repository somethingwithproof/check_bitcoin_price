# SonarCloud configuration
# NOTE: projectKey and organization must match exactly what SonarCloud shows
# under your project's "Information" / organization settings. For projects
# auto-provisioned from a GitHub org the key is usually "<org>_<repo>".
sonar.projectKey=somethingwithproof_check_bitcoin_price
sonar.organization=somethingwithproof

# Source / test layout
sonar.sources=check_bitcoin_price
sonar.tests=tests
sonar.python.version=3.12, 3.13

# Coverage and test reports (produced by the CI sonarcloud job)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest.xml
