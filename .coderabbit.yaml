# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/getting-started/configure-coderabbit
# NOTE: this file only tunes CodeRabbit's behaviour. It does NOT enable
# CodeRabbit by itself -- the CodeRabbit GitHub App must be installed on the
# org and granted access to this repo for any reviews to happen.
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.lock"
chat:
  auto_reply: true
